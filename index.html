<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourth Dynasty Constraint Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c0f;color:#e4e0d8;font-family:'Crimson Pro',Georgia,serif;overflow:hidden;height:100vh}
:root{--m:'JetBrains Mono',monospace}
input[type=range]{-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.08);border-radius:2px;outline:none;height:3px;width:100%}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:#d4a855;cursor:pointer}
input[type=range]::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#d4a855;cursor:pointer;border:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.header{border-bottom:1px solid rgba(212,168,85,0.18);padding:14px 22px;background:linear-gradient(180deg,rgba(212,168,85,0.05)0%,transparent 100%);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.header h1{font-size:18px;font-weight:700;letter-spacing:0.04em;color:#d4a855;margin:0}
.header .sub{font-size:10px;color:rgba(255,255,255,0.3);font-family:var(--m);letter-spacing:0.06em;margin-top:2px}
.toggles{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.tog{border-radius:5px;padding:5px 12px;font-size:10px;font-family:var(--m);font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);transition:all .15s;position:relative}
.tog.on{background:rgba(212,168,85,0.15);border-color:rgba(212,168,85,0.4);color:#fff}
.tog.cann.on{background:rgba(204,85,0,0.2);border-color:rgba(204,85,0,0.5);color:#ff8c33}
.layout{display:flex;height:calc(100vh - 56px)}
.sidebar{width:310px;min-width:310px;border-right:1px solid rgba(255,255,255,0.05);padding:14px;overflow-y:auto;background:rgba(255,255,255,0.008)}
.main{flex:1;padding:16px 22px;overflow-y:auto}
.section-label{font-size:9px;color:rgba(212,168,85,0.55);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;font-family:var(--m)}
.slider-row{margin-bottom:6px}
.slider-row .top{display:flex;justify-content:space-between;margin-bottom:2px;align-items:baseline}
.slider-row label{font-size:10px;color:rgba(255,255,255,0.5);display:flex;align-items:center;gap:4px}
.slider-row .val{font-size:10.5px;color:#d4a855;font-family:var(--m)}
.cards{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.card{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:11px 13px;min-width:120px;flex:1 1 120px;position:relative}
.card.alert{background:rgba(204,85,0,0.10);border-color:rgba(204,85,0,0.35)}
.card.hl{background:rgba(68,170,153,0.08);border-color:rgba(68,170,153,0.3)}
.card.dur{background:rgba(91,152,212,0.08);border-color:rgba(91,152,212,0.3)}
.card .lbl{font-size:8px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);margin-bottom:4px;font-family:var(--m);display:flex;justify-content:space-between;align-items:center}
.card .num{font-size:18px;font-weight:700;color:#d4a855;font-family:var(--m)}
.card.alert .num{color:#cc5500}.card.hl .num{color:#4a9}.card.dur .num{color:#5b98d4}
.card .sub{font-size:8px;color:rgba(255,255,255,0.3);margin-top:2px}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.05);margin-bottom:14px;overflow-x:auto}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:7px 13px;color:rgba(255,255,255,0.3);font-size:10px;font-family:var(--m);cursor:pointer;white-space:nowrap}
.tab.active{border-bottom-color:#d4a855;color:#d4a855;font-weight:600}
.chart-panel{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);border-radius:9px;padding:14px;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:600;color:#d4a855;margin-bottom:3px}
.chart-desc{font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:10px}
canvas{width:100%!important;border-radius:4px}
.data-table{width:100%;border-collapse:collapse;font-size:9px;font-family:var(--m)}
.data-table th{padding:5px 6px;text-align:left;color:#d4a855;font-weight:600;border-bottom:1px solid rgba(212,168,85,0.18);white-space:nowrap}
.data-table td{padding:3px 6px;border-bottom:1px solid rgba(255,255,255,0.025);color:rgba(255,255,255,0.45)}
.data-table tr.deficit{background:rgba(204,85,0,0.03)}
.exp-btn{width:100%;background:rgba(212,168,85,0.1);border:1px solid rgba(212,168,85,0.3);border-radius:5px;padding:8px;color:#d4a855;font-size:10px;font-family:var(--m);font-weight:600;cursor:pointer;margin-top:12px;letter-spacing:0.05em}
.method{margin-top:14px;padding:10px 14px;background:rgba(212,168,85,0.035);border:1px solid rgba(212,168,85,0.1);border-radius:7px;font-size:10px;color:rgba(255,255,255,0.38);line-height:1.6}
.freq-bar{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.freq-bar .name{width:120px;font-size:9.5px;color:rgba(255,255,255,0.45);font-family:var(--m)}
.freq-bar .bar{height:6px;background:linear-gradient(90deg,#cc5500,#d4a855);border-radius:3px}
.freq-bar .ct{font-size:9.5px;color:#d4a855;font-family:var(--m)}
.struct-ed{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.06);border-radius:7px;padding:10px;margin-bottom:8px}
.struct-ed.disabled{opacity:0.35}.struct-ed.disabled .struct-grid,.struct-ed.disabled .dur-box{display:none}
.struct-ed .sname{font-size:10.5px;font-weight:600;color:#d4a855;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.struct-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 10px}
.help-box{padding:10px 16px;background:rgba(212,168,85,0.05);border:1px solid rgba(212,168,85,0.15);border-radius:0 0 7px 7px;font-size:10.5px;color:rgba(255,255,255,0.55);line-height:1.6;border-top:none}
.sc-row{display:flex;gap:5px;margin-top:6px}
.sc-row input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:5px 8px;color:#e4e0d8;font-size:10px;font-family:var(--m);outline:none}
.sc-row button{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:5px 10px;color:rgba(255,255,255,0.5);font-size:9px;font-family:var(--m);cursor:pointer}
.expand-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:rgba(212,168,85,0.7);margin-bottom:8px;cursor:pointer;font-family:var(--m);display:flex;justify-content:space-between;background:rgba(212,168,85,0.06);border:1px solid rgba(212,168,85,0.15);border-radius:5px;padding:9px 10px;transition:all .15s}
.expand-hdr:hover{background:rgba(212,168,85,0.12);border-color:rgba(212,168,85,0.3)}
.tip{position:relative;display:inline-flex;align-items:center;justify-content:center;width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);font-size:7.5px;font-family:var(--m);cursor:help;flex-shrink:0;border:1px solid rgba(255,255,255,0.08)}
.tip:hover{background:rgba(212,168,85,0.15);color:#d4a855;border-color:rgba(212,168,85,0.3)}
.tip .tt{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(12,12,15,0.97);border:1px solid rgba(212,168,85,0.3);border-radius:6px;padding:8px 10px;font-size:10px;font-family:'Crimson Pro',Georgia,serif;font-weight:400;color:rgba(255,255,255,0.7);width:210px;line-height:1.45;z-index:100;pointer-events:none;text-transform:none;letter-spacing:0;box-shadow:0 4px 16px rgba(0,0,0,0.5)}
.tip:hover .tt{display:block}
.sidebar .tip .tt{left:0;transform:none}
.cards .tip .tt{left:auto;right:0;transform:none}
.s-btn{padding:2px 7px;font-size:7.5px;font-family:var(--m);border-radius:3px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);font-weight:600}
.s-btn:hover{border-color:rgba(212,168,85,0.4);color:#d4a855}
.s-btn.on{background:rgba(68,170,153,0.15);border-color:rgba(68,170,153,0.4);color:#4a9}
.s-btn.solo{background:rgba(212,168,85,0.12);border-color:rgba(212,168,85,0.4);color:#d4a855}
.leg-item{display:inline-flex;align-items:center;gap:4px;margin-right:12px;cursor:pointer;font-size:8.5px;font-family:var(--m);padding:2px 0;user-select:none}
.leg-item.off{opacity:0.3}
.leg-item .dot{width:10px;height:3px;border-radius:1px}
.dur-box{margin-top:5px;padding:7px 9px;background:rgba(91,152,212,0.06);border:1px solid rgba(91,152,212,0.15);border-radius:5px;font-size:9.5px;font-family:var(--m);color:rgba(255,255,255,0.5);line-height:1.6}
.dur-box .dv{color:#5b98d4;font-weight:700;font-size:13px}
.dur-box .warn{color:#cc5500;font-size:8.5px;margin-top:2px}
.rev-panel{background:rgba(91,152,212,0.04);border:1px solid rgba(91,152,212,0.12);border-radius:7px;padding:12px;margin-bottom:12px}
.rev-panel .rp-title{font-size:11px;font-weight:600;color:#5b98d4;margin-bottom:6px}
.rev-result{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:7px;margin-top:8px}
.rev-item{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:5px;padding:7px 9px}
.rev-item .rl{font-size:8px;color:rgba(255,255,255,0.4);font-family:var(--m);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px}
.rev-item .rv{font-size:13px;font-weight:700;font-family:var(--m)}
.rev-item .rv.up{color:#cc5500}.rev-item .rv.ok{color:#4a9}
.rev-item .rc{font-size:7.5px;color:rgba(255,255,255,0.3);margin-top:1px}
.sens-table{width:100%;border-collapse:collapse;font-size:9.5px;font-family:var(--m);margin-top:8px}
.sens-table th{padding:6px 8px;text-align:left;color:#d4a855;font-weight:600;border-bottom:1px solid rgba(212,168,85,0.18)}
.sens-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,0.03);color:rgba(255,255,255,0.45)}
.sens-table td.better{color:#4a9}.sens-table td.worse{color:#cc5500}
.labour-panel{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:9px;margin-bottom:12px}
.labour-panel .lp-title{font-size:9px;color:rgba(212,168,85,0.55);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px;font-family:var(--m);display:flex;align-items:center;gap:5px}
.preset-row{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.preset-row button{flex:1;padding:5px 4px;font-size:8.5px;font-family:var(--m);border-radius:4px;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);font-weight:600;min-width:60px}
.preset-row button:hover{border-color:rgba(212,168,85,0.4);color:#d4a855}
.tip.open .tt{display:block}
.tog.present.on{background:rgba(91,152,212,0.2);border-color:rgba(91,152,212,0.5);color:#8fbce8}
/* ── Presentation Mode ── */
body.present{overflow:auto}
body.present .sidebar{display:none}
body.present .main{padding:26px 40px}
.pres-wrap{max-width:1180px;margin:0 auto}
.pres-status{font-size:22px;line-height:1.45;font-weight:600;color:#e4e0d8;border-left:4px solid #cc5500;padding:14px 20px;background:rgba(204,85,0,0.08);border-radius:0 8px 8px 0;margin-bottom:22px}
.pres-status.ok{border-left-color:#4a9;background:rgba(68,170,153,0.08)}
.pres-status b{color:#d4a855}
.pres-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:22px}
.pres-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:18px 20px}
.pres-card.alert{background:rgba(204,85,0,0.10);border-color:rgba(204,85,0,0.35)}
.pres-card.bind{background:rgba(91,152,212,0.10);border-color:rgba(91,152,212,0.4)}
.pres-card .pl{font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.45);font-family:var(--m);margin-bottom:8px}
.pres-card .pn{font-size:40px;font-weight:700;color:#d4a855;font-family:var(--m);line-height:1}
.pres-card.alert .pn{color:#cc5500}.pres-card.bind .pn{color:#5b98d4}
.pres-card.bind .pn{font-size:24px;line-height:1.2;word-break:break-word} /* binding value is a label, not a number — shrink & allow wrap */
.pres-card .ps{font-size:12px;color:rgba(255,255,255,0.4);margin-top:6px}
.pres-cols{display:grid;grid-template-columns:1.1fr 1fr;gap:22px;align-items:start}
.pres-ctrls{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:18px 20px}
.pres-ctrls h3{font-size:13px;text-transform:uppercase;letter-spacing:0.1em;color:rgba(212,168,85,0.7);font-family:var(--m);margin-bottom:14px;font-weight:700}
.pres-ctrls .slider-row{margin-bottom:14px}
.pres-ctrls label{font-size:14px;color:rgba(255,255,255,0.7)}
.pres-ctrls .val{font-size:15px}
.pres-ctrls input[type=range]{height:5px}
.pres-ctrls input[type=range]::-webkit-slider-thumb{width:18px;height:18px}
.pres-ctrls input[type=range]::-moz-range-thumb{width:18px;height:18px}
.pres-delta{margin-top:16px;font-size:13px;font-family:var(--m);color:rgba(255,255,255,0.6);line-height:1.9;border-top:1px solid rgba(255,255,255,0.07);padding-top:14px}
.pres-delta .k{color:rgba(255,255,255,0.45)}
.pres-delta .b0{color:rgba(255,255,255,0.55)}.pres-delta .b1{color:#d4a855;font-weight:700}
.pres-reset{width:100%;margin-top:16px;background:rgba(255,140,51,0.12);border:1px solid rgba(255,140,51,0.4);border-radius:6px;padding:11px;color:#ff8c33;font-size:13px;font-family:var(--m);font-weight:700;cursor:pointer;letter-spacing:0.04em}
.pres-reset:hover{background:rgba(255,140,51,0.2)}
.pres-bind{margin-top:16px;font-size:13px;font-family:var(--m);line-height:1.8}
.pres-bind .row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.pres-bind .row.top{color:#5b98d4;font-weight:700}
/* ── Responsive: small / projection screens ── */
@media (max-width:900px){
  body{overflow:auto;height:auto}
  .layout{flex-direction:column;height:auto}
  .sidebar{width:100%;min-width:0;border-right:none;border-bottom:1px solid rgba(255,255,255,0.05)}
  .pres-cols{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="header">
  <div><h1>FOURTH DYNASTY CONSTRAINT ENGINE</h1><div class="sub"><span id="verTag"></span> · SNEFERU → GIZA · QUARRY·DRESS·TRANSPORT·PLACE · CANNIBALISATION · SENSITIVITY</div></div>
  <div class="toggles" id="toggleBar"></div>
</div>
<div id="helpBox" class="help-box" style="display:none"></div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="mainPanel"></div>
</div>
<script>
"use strict";
var VERSION="4.1"; // single source of truth: title, header, and fixture reports all read this
var S={cann:false,nl:true,seas:true,present:false,tab:"deficit",showS:false,showHelp:false,scenarios:[],legFilter:{cU:true,tU:true,aU:true},activePreset:"lehner",activeGroup:"all"};
try{var _sv=localStorage.getItem("giza4d_scenarios");if(_sv){var _p=JSON.parse(_sv);if(_p&&_p.length)S.scenarios=_p}}catch(e){}
function persistSc(){try{localStorage.setItem("giza4d_scenarios",JSON.stringify(S.scenarios))}catch(e){}}
// ── Structures: Full 4th Dynasty ──
var structs=[
  {id:"meidum",name:"Meidum Pyramid (Sneferu)",tm:640000,cl:610000,cs:25000,gr:5000,sy:-2610,ey:-2595,ob:900000,fin:0.5,enabled:true},
  {id:"bent",name:"Bent Pyramid (Sneferu)",tm:3500000,cl:3380000,cs:100000,gr:20000,sy:-2600,ey:-2585,ob:4500000,fin:1,enabled:true},
  {id:"red",name:"Red Pyramid (Sneferu)",tm:4000000,cl:3870000,cs:120000,gr:10000,sy:-2590,ey:-2575,ob:5200000,fin:1,enabled:true},
  {id:"khufu",name:"Great Pyramid (Khufu)",tm:6100000,cl:5955000,cs:115000,gr:8000,sy:-2580,ey:-2560,ob:8000000,fin:2,enabled:true},
  {id:"khafre",name:"Pyramid of Khafre",tm:4880000,cl:4740000,cs:120000,gr:20000,sy:-2558,ey:-2532,ob:6500000,fin:1.5,enabled:true},
  {id:"menkaure",name:"Pyramid of Menkaure",tm:700000,cl:520000,cs:60000,gr:120000,sy:-2530,ey:-2510,ob:1000000,fin:0.5,enabled:true}];
var C={qr:340,tq:40,aq:15,dc:340,dt:50,da:10,tc:300,tt:35,at:10,pr:280,wf:25000,wd:300,lQ:35,lT:25,lD:25,lP:15}; // on-load default == Lehner preset
var initStructs=JSON.parse(JSON.stringify(structs)),initC=JSON.parse(JSON.stringify(C));
var COL={core:"#cc5500",tura:"#5b98d4",aswan:"#4a9",demand:"#cc5500",capacity:"rgba(212,168,85,0.25)",net:"#e85",recycled:"#4a9",orthodox:"#ff8c33",deficit:"#cc5500",coreArea:"rgba(204,85,0,0.2)",turaArea:"rgba(91,152,212,0.15)",aswanArea:"rgba(68,170,153,0.15)"};
var BASE_WF=25000;

// ── Tooltips ──
var TT={
  cann:"Choi/Lee hypothesis: structures overbuilt then carved down. Surplus stone recycled to next structure in sequence.",
  nl:"Realistic demand curves: core peaks early (big lower courses), casing late (top-down), granite mid-build (chambers).",
  seas:"Three Egyptian seasons: Akhet (flood\u2014more workers, better transport), Peret (normal), Shemu (harvest\u2014reduced capacity).",
  help:"Show/hide quick reference.",reset:"Reset all to defaults.",present:"Presentation Mode: enlarged headline numbers, six key levers, auto-highlighted binding subsystem and a baseline→changed→consequence readout for projection.",
  progD:"Total stone across all enabled structures.",annCap:"Annual throughput limited by bottleneck per chain.",
  accDef:"Cumulative gap between demand and the tested capacity. Above zero means THESE assumed rates cannot deliver the programme in the attested timeline — evidence the real rates were higher than assumed (or the schedule longer), NOT that the monuments could not be built.",
  priBot:"Subsystem binding most frequently.",avgU:"Avg core utilisation. >100% = over-committed.",
  stoneR:"Stone recycled from overbuilt masses (cannibalisation).",defRed:"Deficit change vs orthodox model.",
  actDur:"Longest SINGLE structure's build+finishing time at current capacity — not the whole programme. For end-to-end programme length see Programme Completion.",
  progComp:"End-to-end programme length: latest structure finish minus earliest start, using each structure's overrun-adjusted duration at current capacity (historical start years, concurrent building preserved). Compared against the historical span.",
  qr:"Daily core limestone quarrying from Giza/Dahshur plateau quarries.",
  tq:"Daily output from Tura quarries. Fine casing limestone.",
  aq:"Daily output from Aswan quarries, 500mi upstream. Granite.",
  dc:"Daily core-block dressing throughput. Core masonry is rough-set with wide joints (Petrie; Arnold), so dressing is fast and rarely binding. PROVISIONAL \u2014 pending Stocks 2003 per-block rate audit.",
  dt:"Daily Tura casing per-block JOINT PREPARATION + fitting throughput (bed/rising joints for fine jointing). The slow fractions-of-a-mm surface smoothing is NOT here \u2014 per Haase (2012) via Arnold it is a TERMINAL post-placement phase (see structure 'Finishing yrs'). PROVISIONAL rate.",
  da:"Daily Aswan granite per-element dressing (dolerite pounding + grinding). Weeks\u2013months per element; genuine per-block constraint. NOT affected by the Haase casing correction \u2014 granite is a different material with in-pipeline fine dressing (Stocks 2003). PROVISIONAL rate.",
  tc:"Daily plateau transport from quarry to site.",
  tt:"Daily Tura transport across Nile. Often binding.",
  at:"Daily Aswan transport, 500mi upstream. Almost always binding.",
  pr:"Placement throughput in TONNES of masonry set per day (not a block count). Compared directly against daily tonnage demand.",
  lD:"% of workforce allocated to dressing/finishing operations.",
  wf:"Peak workforce. Scales quarry/transport/placement proportionally (base: 25,000 = 1.0\u00D7). Tura/Aswan transport is boat-limited, unaffected.",
  wd:"Working days/year. Only applies when seasonal is off.",
  lQ:"% of workforce allocated to quarrying operations.",
  lT:"% of workforce allocated to transport operations.",
  lP:"% of workforce allocated to block placement."
};

// ── Profiles ──
function dP(f){if(f<0||f>1)return 0;return(Math.min(1,f/0.15)*Math.max(0.1,1-f*0.7)+(f>0.75?0.15*Math.sin((f-0.75)*Math.PI/0.25):0))*1.35}
function cPr(f){return f<0.4?0.2:f>0.85?2.2:0.6+1.6*((f-0.4)/0.45)}
function gP(f){return(f<0.1||f>0.6)?0.3:1.8*Math.sin((f-0.1)*Math.PI/0.5)}

// ── Seasons ──
var SEA={akhet:{n:"Akhet (Flood)",d:120,wf:1.3,wt:1.8,qm:1,pm:0.9},peret:{n:"Peret (Growing)",d:120,wf:1,wt:1,qm:1,pm:1},shemu:{n:"Shemu (Harvest)",d:125,wf:0.7,wt:0.6,qm:0.95,pm:1}};
function sCap(c,use){
  var wfS=c.wf/BASE_WF;var qS=c.lQ/35;var tS=c.lT/25;var dS=c.lD/25;var pS=c.lP/15;
  // Dressing: core is workforce-scaled (mass labour); Tura/Aswan are specialist-limited (like their quarries), not workforce-scaled.
  if(!use){var w=c.wd;return{aQ:c.qr*wfS*qS*w,aT:c.tq*w,aA:c.aq*w,aDc:c.dc*wfS*dS*w,aDt:c.dt*w,aDa:c.da*w,aTr:c.tc*wfS*tS*w,aTT:c.tt*w,aAT:c.at*w,aP:c.pr*wfS*pS*w,sb:null}}
  var t={aQ:0,aT:0,aA:0,aDc:0,aDt:0,aDa:0,aTr:0,aTT:0,aAT:0,aP:0},sb={};
  ["akhet","peret","shemu"].forEach(function(k){var s=SEA[k],wd=Math.round(s.d*0.9);
    var o={days:wd,quarry:c.qr*wfS*qS*s.wf*s.qm*wd,tura:c.tq*s.qm*wd,aswan:c.aq*s.qm*wd,dressC:c.dc*wfS*dS*s.wf*s.qm*wd,dressT:c.dt*s.qm*wd,dressA:c.da*s.qm*wd,transport:c.tc*wfS*tS*s.wf*wd,turaT:c.tt*s.wt*wd,aswanT:c.at*s.wt*wd,placement:c.pr*wfS*pS*s.wf*s.pm*wd,wf:Math.round(c.wf*s.wf)};
    sb[k]=o;t.aQ+=o.quarry;t.aT+=o.tura;t.aA+=o.aswan;t.aDc+=o.dressC;t.aDt+=o.dressT;t.aDa+=o.dressA;t.aTr+=o.transport;t.aTT+=o.turaT;t.aAT+=o.aswanT;t.aP+=o.placement});
  t.sb=sb;return t}

// ── Duration ──
function calcDuration(s,c,cann,seas){
  var cap=sCap(c,seas);var eCC=Math.min(cap.aQ,cap.aDc,cap.aTr,cap.aP);var eTC=Math.min(cap.aT,cap.aDt,cap.aTT);var eAC=Math.min(cap.aA,cap.aDa,cap.aAT);
  if(eCC+eTC+eAC<=0)return{years:Infinity,binding:"No capacity"};
  var coreM=cann?s.ob*(s.cl/s.tm):s.cl;var turaM=s.cs;var aswnM=s.gr;
  var cY=eCC>0?coreM/eCC:Infinity;var tY=eTC>0?turaM/eTC:Infinity;var aY=eAC>0?aswnM/eAC:Infinity;
  var maxY=Math.max(cY,tY,aY);var b;
  // Name the actual tightest STAGE within the binding chain (not just the chain), so "binding" is the real limiting subsystem.
  if(maxY===cY){b=eCC===cap.aP?"Placement":eCC===cap.aTr?"Plateau Trnsp":eCC===cap.aDc?"Core Dressing":"Core Quarry";}
  else if(maxY===tY){b=eTC===cap.aTT?"Tura Transport":eTC===cap.aDt?"Casing Dressing":"Tura Quarry";}
  else{b=eAC===cap.aAT?"Aswan Transport":eAC===cap.aDa?"Granite Dressing":"Aswan Quarry";}
  var buildY=Math.ceil(maxY);var finY=s.fin||0;
  return{years:buildY+finY,buildYears:buildY,finYears:finY,binding:b}}

// ── Reverse Solver ──
function reverseSolve(s,tgt,c,cann,seas){
  if(tgt<=0)return null;var coreM=cann?s.ob*(s.cl/s.tm):s.cl;
  // Terminal finishing (Haase) is post-completion: it eats into the reign, compressing the block-laying window.
  var finY=s.fin||0;var buildTgt=Math.max(0.5,tgt-finY);
  // Compare REQUIRED annual throughput against the SAME effective annual capacity the forward engine uses
  // (sCap bakes in workforce scaling, labour split and seasonal multipliers), so figures are directly comparable.
  var cap=sCap(c,seas);
  var reqC=coreM/buildTgt,reqT=s.cs/buildTgt,reqA=s.gr/buildTgt; // tonnes / year
  function mk(req,cap){return{req:Math.round(req),cur:Math.round(cap),ok:req<=cap}}
  return{buildTgt:buildTgt,finY:finY,
    core:mk(reqC,cap.aQ),coreDr:mk(reqC,cap.aDc),coreTr:mk(reqC,cap.aTr),place:mk(reqC,cap.aP),
    tura:mk(reqT,cap.aT),turaDr:mk(reqT,cap.aDt),turaTr:mk(reqT,cap.aTT),
    aswan:mk(reqA,cap.aA),aswanDr:mk(reqA,cap.aDa),aswanTr:mk(reqA,cap.aAT)}}

// ── Engine ──
function run(st,c,cann,nl,seas){
  var active=st.filter(function(s){return s.enabled});
  if(active.length===0)return{res:[],sum:{totD:0,totCap:0,totDef:0,totR:0,bf:{},py:0,dfy:0,avgU:0,sb:null}};
  var res=[],rs=0,tr=0,sorted=active.slice().sort(function(a,b){return a.sy-b.sy});
  var ps=sorted[0].sy,pe=sorted[sorted.length-1].ey,ty=pe-ps+1; // inclusive: years ps..pe = pe-ps+1 rows
  if(ty<=0)return{res:[],sum:{totD:0,totCap:0,totDef:0,totR:0,bf:{},py:0,dfy:0,avgU:0,sb:null}};
  // ── Profile normalisation (mass conservation) ──
  // Each structure spreads its mass over the SAME inclusive year grid the loop samples (sy..ey).
  // Divide the profile by the sum of its samples so per-structure demand sums to exactly the entered mass.
  var norm={};
  sorted.forEach(function(s){var d=s.ey-s.sy,N=d+1,sC=0,sT=0,sG=0;
    if(d>0){for(var yy=s.sy;yy<=s.ey;yy++){var f=(yy-s.sy)/d;sC+=dP(f);sT+=cPr(f);sG+=gP(f)}}
    norm[s.id]={N:N,sC:sC>0?sC:N,sT:sT>0?sT:N,sG:sG>0?sG:N}});
  var cap=sCap(c,seas),eCC=Math.min(cap.aQ,cap.aDc,cap.aTr,cap.aP),eTC=Math.min(cap.aT,cap.aDt,cap.aTT),eAC=Math.min(cap.aA,cap.aDa,cap.aAT);
  for(var y=ps;y<=pe;y++){
    var d={y:y,dy:Math.abs(y)+" BCE",cCap:eCC,tCap:eTC,aCap:eAC,totCap:eCC+eTC+eAC};
    var tCD=0,tTD=0,tAD=0,an=[];
    sorted.forEach(function(s){if(y>=s.sy&&y<=s.ey){
      var nm=s.name.indexOf("(")>-1?s.name.split("(")[1].replace(")",""):s.name.split(" ")[0];
      an.push(nm);var dur=s.ey-s.sy;if(dur<=0)return;var fr=(y-s.sy)/dur;var nz=norm[s.id];
      var cb=cann?s.ob*(s.cl/s.tm):s.cl;
      // Normalised weights: profile(fr)/Σprofile in non-linear mode; even 1/N split otherwise. Both sum to entered mass.
      if(nl){tCD+=cb*dP(fr)/nz.sC;tTD+=s.cs*cPr(fr)/nz.sT;tAD+=s.gr*gP(fr)/nz.sG}
      else{tCD+=cb/nz.N;tTD+=s.cs/nz.N;tAD+=s.gr/nz.N}}});
    var ru=0;if(cann&&rs>0){ru=Math.min(rs,tCD*0.6);rs-=ru}
    d.cD=tCD;d.tD=tTD;d.aD=tAD;d.totD=tCD+tTD+tAD;d.ru=ru;d.effD=d.totD-ru;d.an=an;
    d.cDef=Math.max(0,(tCD-ru)-eCC);d.tDef=Math.max(0,tTD-eTC);d.aDef=Math.max(0,tAD-eAC);
    d.totDef=d.cDef+d.tDef+d.aDef;
    if(cann)sorted.forEach(function(s){if(y===s.ey){var sur=s.ob-s.tm;rs+=sur;tr+=sur}});
    d.ra=rs;
    // Binding = the TIGHTEST subsystem this year (highest demand/capacity), i.e. the true limiting constraint.
    // bn lists every subsystem over capacity; bc is the single tightest.
    var stg=[["Core Quarry",tCD-ru,cap.aQ],["Core Dressing",tCD-ru,cap.aDc],["Plateau Trnsp",tCD-ru,cap.aTr],["Placement",tCD-ru,cap.aP],
      ["Tura Quarry",tTD,cap.aT],["Casing Dressing",tTD,cap.aDt],["Tura Transport",tTD,cap.aTT],
      ["Aswan Quarry",tAD,cap.aA],["Granite Dressing",tAD,cap.aDa],["Aswan Transport",tAD,cap.aAT]];
    var bn=[],bc="None",bestR=1;
    stg.forEach(function(x){var r=x[2]>0?x[1]/x[2]:0;if(r>1)bn.push(x[0]);if(r>bestR){bestR=r;bc=x[0]}});
    d.bn=bn;d.bc=bc;
    d.cU=eCC>0?Math.min(200,((tCD-ru)/eCC)*100):0;d.tU=eTC>0?Math.min(200,(tTD/eTC)*100):0;d.aU=eAC>0?Math.min(200,(tAD/eAC)*100):0;
    res.push(d)}
  var ad=0;res.forEach(function(r){ad+=r.totDef;r.accDef=ad});
  var bf={};res.forEach(function(r){if(r.bc&&r.bc!=="None")bf[r.bc]=(bf[r.bc]||0)+1});// count how often each subsystem is THE binding constraint
  var sum={totD:0,totCap:res.length*(eCC+eTC+eAC),totDef:ad,totR:tr,bf:bf,py:ty,
    dfy:res.filter(function(r){return r.totDef>0}).length,
    avgU:res.length>0?res.reduce(function(s2,r){return s2+r.cU},0)/res.length:0,sb:cap.sb};
  res.forEach(function(r){sum.totD+=r.totD});return{res:res,sum:sum}}

// ── Sensitivity ──
function runSensitivity(st,c,cann,nl,seas){
  var levels=[{label:"Baseline",mult:1},{label:"+25%",mult:1.25},{label:"+50%",mult:1.5},{label:"+100%",mult:2}];
  var params=[
    {key:"qr",label:"Core Quarry"},
    {key:"dc",label:"Core Dressing"},
    {key:"tc",label:"Plateau Transport"},
    {key:"pr",label:"Placement"},
    {key:"tq",label:"Tura Quarry"},
    {key:"dt",label:"Casing Dressing"},
    {key:"tt",label:"Tura Transport"},
    {key:"aq",label:"Aswan Quarry"},
    {key:"da",label:"Granite Dressing"},
    {key:"at",label:"Aswan Transport"},
    {key:"ALL",label:"All Rates"}];
  var results=[];
  params.forEach(function(p){var row={param:p.label,values:[]};
    levels.forEach(function(lv){
      var cc={};for(var k in c)cc[k]=c[k];
      if(p.key==="ALL"){["qr","dc","tc","pr","tq","dt","tt","aq","da","at"].forEach(function(k2){cc[k2]=Math.round(c[k2]*lv.mult)})}
      else{cc[p.key]=Math.round(c[p.key]*lv.mult)}
      var an=run(st,cc,cann,nl,seas);
      var active=st.filter(function(s){return s.enabled});
      var maxDur=0;active.forEach(function(s){var d=calcDuration(s,cc,cann,seas);if(d.years>maxDur)maxDur=d.years});
      row.values.push({deficit:an.sum.totDef,duration:maxDur,dfy:an.sum.dfy})});
    results.push(row)});
  return{levels:levels,results:results}}

// ── Format ──
function fn(n){if(n==null||isNaN(n))return"\u2014";if(n>=1e6)return(n/1e6).toFixed(2)+"M";if(n>=1e3)return(n/1e3).toFixed(0)+"K";return Math.round(n).toLocaleString()}
function ft(n){if(n==null||isNaN(n)||n===0)return"0 t";return fn(n)+" t"}
function fp(n){if(n==null||isNaN(n))return"0%";return Math.round(n)+"%"}
function tip(key){return'<span class="tip">i<span class="tt">'+(TT[key]||"")+'</span></span>'}

// ── Canvas ──
function drawChart(id,data,series,opts){
  var c=document.getElementById(id);if(!c||!data||data.length===0)return;
  var dpr=window.devicePixelRatio||1,w=c.parentElement.clientWidth-2,ht=opts.height||300;
  c.width=w*dpr;c.height=ht*dpr;c.style.width=w+"px";c.style.height=ht+"px";
  var ctx=c.getContext("2d");ctx.scale(dpr,dpr);
  var ml=58,mr=15,mt=22,mb=48,pw=w-ml-mr,ph=ht-mt-mb,len=Math.max(1,data.length-1);
  var maxV=0;data.forEach(function(d){if(opts.stacked){var sv=0;opts.stacked.forEach(function(s){sv+=d[s.key]||0});if(sv>maxV)maxV=sv}
    series.forEach(function(s){if(s.hidden)return;var v=d[s.key];if(v>maxV)maxV=v})});
  if(maxV===0)maxV=1;maxV*=1.1;
  ctx.strokeStyle="rgba(255,255,255,0.04)";ctx.lineWidth=1;
  for(var i=0;i<=5;i++){var gy=mt+ph-ph*(i/5);ctx.beginPath();ctx.moveTo(ml,gy);ctx.lineTo(ml+pw,gy);ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="9px 'JetBrains Mono',monospace";ctx.textAlign="right";
    ctx.fillText(opts.refLine!=null?Math.round(maxV*i/5)+"%":fn(maxV*i/5),ml-6,gy+3)}
  ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="8px 'JetBrains Mono',monospace";ctx.textAlign="center";
  var step=Math.max(1,Math.floor(data.length/14));
  data.forEach(function(d,i){if(i%step===0||i===data.length-1){var x=ml+pw*(i/len);ctx.save();ctx.translate(x,mt+ph+10);ctx.rotate(-0.4);ctx.fillText(d.dy||"",0,0);ctx.restore()}});
  if(opts.stacked){var bw=Math.max(2,pw/data.length-1);data.forEach(function(d,i){var x=ml+pw*(i/len)-bw/2,cumH=0;
    opts.stacked.forEach(function(s){if(s.hidden)return;var v=d[s.key]||0;var barH=ph*(v/maxV);ctx.fillStyle=s.color;ctx.fillRect(x,mt+ph-cumH-barH,bw,barH);cumH+=barH})})}
  series.forEach(function(s){if(s.hidden)return;
    if(s.type==="bar"){var bw2=Math.max(1,pw/data.length-1);data.forEach(function(d,i){var v=d[s.key]||0;ctx.fillStyle=s.fill||s.color;ctx.fillRect(ml+pw*(i/len)-bw2/2,mt+ph-ph*(v/maxV),bw2,ph*(v/maxV))})}
    if(s.type==="area"){ctx.beginPath();ctx.moveTo(ml,mt+ph);data.forEach(function(d,i){ctx.lineTo(ml+pw*(i/len),mt+ph-ph*((d[s.key]||0)/maxV))});ctx.lineTo(ml+pw,mt+ph);ctx.closePath();ctx.fillStyle=s.fill||"rgba(204,85,0,0.15)";ctx.fill();
      ctx.beginPath();data.forEach(function(d,i){var x=ml+pw*(i/len),y=mt+ph-ph*((d[s.key]||0)/maxV);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.strokeStyle=s.color;ctx.lineWidth=s.width||2;if(s.dash)ctx.setLineDash(s.dash);ctx.stroke();ctx.setLineDash([])}
    if(s.type==="line"){ctx.beginPath();data.forEach(function(d,i){var x=ml+pw*(i/len),y=mt+ph-ph*((d[s.key]||0)/maxV);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.strokeStyle=s.color;ctx.lineWidth=s.width||2;if(s.dash)ctx.setLineDash(s.dash);ctx.stroke();ctx.setLineDash([])}});
  if(opts.refLine!=null){var ry=mt+ph-ph*(opts.refLine/maxV);ctx.strokeStyle="rgba(204,85,0,0.35)";ctx.setLineDash([4,4]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ml,ry);ctx.lineTo(ml+pw,ry);ctx.stroke();ctx.setLineDash([])}}

function renderMain(){

  var res=an.res,sum=an.sum,hasData=res.length>0;

    if(s.sy<earliestStart)earliestStart=s.sy;if(fin>latestFinish)latestFinish=fin}});

  var defRed=S.cann&&bl&&bl.sum.totDef>0?Math.round(((bl.sum.totDef-sum.totDef)/bl.sum.totDef)*100):0;

    panel+='<div class="chart-title">Sensitivity Matrix</div><div class="chart-desc">Each row tests increasing ONE subsystem\'s rate while holding others constant. <span style="color:#4a9">Green cells</span> show improvement vs baseline. The row with the <span style="color:#4a9">biggest green change</span> is the subsystem worth investigating \u2014 it\'s the lever with the most impact. If a row stays unchanged, that subsystem is not currently binding.</div>';
    var sens=runSensitivity(structs,C,S.cann,S.nl,S.seas);
    panel+='<div style="overflow-x:auto"><table class="sens-table"><thead><tr><th>Parameter</th>';

    sens.levels.forEach(function(){panel+='<th style="font-weight:400;color:rgba(255,255,255,0.3)">Duration</th><th style="font-weight:400;color:rgba(255,255,255,0.3)">Deficit</th>'});

    var baseDef=sens.results[0].values[0].deficit;var baseDur=sens.results[0].values[0].duration;
    // Find which row has biggest improvement at +100%
    var bestIdx=-1;var bestImprove=0;
    sens.results.forEach(function(row,ri){var v=row.values[3];var improve=(baseDef-v.deficit)+(baseDur-v.duration)*10000;if(improve>bestImprove){bestImprove=improve;bestIdx=ri}});
    sens.results.forEach(function(row,ri){

        else{panel+='<td class="'+durCls+'">'+v.duration+' yrs</td><td class="'+defCls+'">'+ft(v.deficit)+'</td>'}});

    else{panel+='<div style="overflow-x:auto"><table class="data-table"><thead><tr><th>Name</th><th>Demand</th><th>Deficit</th><th>Yrs</th><th>Util</th><th>Recycled</th><th>Bottleneck</th><th></th></tr></thead><tbody>';
      S.scenarios.forEach(function(s,i){panel+='<tr><td style="color:#d4a855;font-weight:600">'+s.name+'</td><td>'+ft(s.totD)+'</td><td style="color:'+(s.totDef>0?"#cc5500":"inherit")+'">'+ft(s.totDef)+'</td><td>'+s.dfy+'</td><td>'+fp(s.avgU)+'</td><td style="color:'+(s.totR>0?"#4a9":"inherit")+'">'+(s.totR>0?ft(s.totR):"\u2014")+'</td><td>'+s.pb+'</td><td><button onclick="delSc('+i+')" style="background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer">\u00D7</button></td></tr>'});
      panel+='</tbody></table></div>'}
  }
  panel+='</div>';

  // Data table
  var tbl='';
  if(hasData&&S.tab!=="sensitivity"){tbl='<div style="margin-top:12px"><div style="font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.3);margin-bottom:5px;font-family:var(--m)">Year-by-Year Data</div>'+
    '<div style="overflow-x:auto;border:1px solid rgba(255,255,255,0.05);border-radius:7px;max-height:400px;overflow-y:auto"><table class="data-table"><thead><tr>'+
    '<th>Year</th><th>Active</th><th>Demand</th><th>Capacity</th><th>Deficit</th><th>Acc.Def</th>'+(S.cann?'<th>Recycled</th>':'')+'<th>Util%</th><th>Binding</th></tr></thead><tbody>';
  res.forEach(function(r){tbl+='<tr class="'+(r.totDef>0?"deficit":"")+'"><td>'+r.dy+'</td><td style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(r.an.join(",")||"\u2014")+'</td><td>'+ft(r.totD)+'</td><td>'+ft(r.totCap)+'</td><td style="color:'+(r.totDef>0?"#cc5500":"inherit")+'">'+(r.totDef>0?ft(r.totDef):"\u2014")+'</td><td style="color:'+(r.accDef>0?"#cc5500":"inherit")+';font-weight:600">'+ft(r.accDef)+'</td>'+(S.cann?'<td style="color:'+(r.ru>0?"#4a9":"inherit")+'">'+(r.ru>0?ft(r.ru):"\u2014")+'</td>':'')+'<td style="color:'+(r.cU>100?"#cc5500":"inherit")+'">'+fp(r.cU)+'</td><td>'+r.bc+'</td></tr>'});
  tbl+='</tbody></table></div></div>'}

  mp.innerHTML=cards+tabsH+panel+tbl+
    '<div class="method"><b style="color:#d4a855">What a deficit means:</b> a shortfall shows the tested capacity assumptions are inconsistent with the historical timeline — it locates where an estimate set is too low, implying the actual rates were higher (or the schedule longer). It is a test of the <i>numbers</i>, not of whether the monuments could be built; it is not evidence of impossibility. <b style="color:#d4a855">Methodology:</b> Fourth Dynasty constrained throughput model. Six structures (Meidum \u2192 Menkaure). Non-linear demand. Seasonal calendar. Labour allocation prevents double-counting. Cannibalisation: overbuilt masses recycled sequentially, capped 60%/yr. Sensitivity: auto stress-test at +25/50/100%. Capacity = min(quarry, dressing, transport, placement) per ToC. Per-stream dressing (v4): core rough / Tura joint-fitting / Aswan pounded. <b>Casing correction:</b> slow fractions-of-a-mm smoothing is a TERMINAL post-completion phase (Haase 2012 via Arnold: ~2y Khufu, ~1.5y Khafre \u2014 sequential, ramps removed), NOT an in-pipeline per-block rate; it compresses the block-laying window within the reign. Granite per-element dressing remains in-pipeline (Stocks 2003). <b style="color:#cc5500">Dressing rates PROVISIONAL pending Stocks per-block audit.</b> <b>v4.1 corrections:</b> demand profiles are now normalised per structure/stream so Programme Demand conserves the entered masses exactly; programme-year count is inclusive and consistent (rows = years); the reverse solver compares required annual throughput against the same effective capacity as the forward engine; "Longest Structure" and "Programme Completion" are reported separately. Sources: Arnold (1991; 2023 rep. Haase), Haase (2012, Sokar 25), Lehner (1997), Stocks (2003), Verner (2001), Papers 2\u20134.</div>';

  // Charts
  if(hasData)requestAnimationFrame(function(){

// ── Presentation Mode ──
function presData(){
  var an=run(structs,C,S.cann,S.nl,S.seas);
  var bl=run(structs,initC,false,S.nl,S.seas); // same structure selection under orthodox (Lehner) capacities — isolates the lever changes
  var res=an.res,sum=an.sum;
  var bfs=Object.keys(sum.bf).sort(function(a,b){return sum.bf[b]-sum.bf[a]});
  var earliestStart=Infinity,latestFinish=-Infinity;
  structs.forEach(function(s){if(s.enabled){var d=calcDuration(s,C,S.cann,S.seas);
    var fin=s.sy+(isFinite(d.years)?d.years:0);
    if(s.sy<earliestStart)earliestStart=s.sy;if(fin>latestFinish)latestFinish=fin}});
  var progComplete=res.length&&isFinite(latestFinish)?(latestFinish-earliestStart+1):0;
  return{an:an,bl:bl,res:res,sum:sum,bfs:bfs,progComplete:progComplete,progOverrun:res.length?progComplete-sum.py:0};
}
function pcard(label,value,sub,cls){return'<div class="pres-card '+(cls||"")+'"><div class="pl">'+label+'</div><div class="pn">'+value+'</div>'+(sub?'<div class="ps">'+sub+'</div>':'')+'</div>'}
function presReadoutHTML(d){
  var sum=d.sum,res=d.res,bfs=d.bfs;
  if(!res.length)return'<div style="padding:60px;text-align:center;color:rgba(255,255,255,0.3);font-size:18px">Enable at least one structure.</div>';
  var topB=bfs[0]||"None",topBy=sum.bf[topB]||0,defMt=sum.totDef/1e6;
  var readNote='<div style="font-size:13.5px;font-weight:400;color:rgba(255,255,255,0.5);margin-top:9px;line-height:1.45">Reading: these assumed rates cannot meet the attested timeline — so the real capacity must have been higher (or the schedule longer). A test of the numbers, not a claim of impossibility.</div>';
  var status=sum.totDef>0
    ?'<div class="pres-status">Required programme throughput exceeds modeled capacity by <b>'+defMt.toFixed(defMt<10?2:1)+' Mt</b>, with <b>'+topB+'</b> binding for <b>'+topBy+'</b> of '+sum.py+' years.'+readNote+'</div>'
    :'<div class="pres-status ok">Modeled capacity meets programme demand across all <b>'+sum.py+'</b> years — no subsystem binds.</div>';
  var enCount=structs.filter(function(s){return s.enabled}).length;
  return status+'<div class="pres-cards">'+
    pcard("Programme Demand",ft(sum.totD),sum.py+" yr · "+enCount+" structures","")+
    pcard("Annual Capacity",ft(res[0].totCap),"combined / year","")+
    pcard("Accumulated Deficit",ft(sum.totDef),sum.totDef>0?sum.dfy+" deficit yrs":"within capacity",sum.totDef>0?"alert":"")+
    pcard("Programme Completion",d.progComplete?d.progComplete+" yrs":"—",d.progOverrun>0?"+"+d.progOverrun+"y vs historical":"on schedule",d.progOverrun>0?"alert":"")+
    pcard("Binding Subsystem",topB,topBy+" yrs binding","bind")+
    '</div>';
}
function presRightHTML(d){
  var sum=d.sum,bfs=d.bfs,bl=d.bl;
  var h='<div class="chart-panel" style="margin:0 0 14px"><div class="chart-title">Accumulated Deficit</div><canvas id="ch1"></canvas></div>';
  h+='<div class="pres-bind">';
  if(!bfs.length)h+='<div class="row" style="color:#4a9">No binding constraints.</div>';
  else bfs.slice(0,5).forEach(function(nm,i){h+='<div class="row'+(i===0?' top':'')+'"><span>'+nm+'</span><span>'+sum.bf[nm]+'y ('+Math.round(sum.bf[nm]/sum.py*100)+'%)</span></div>'});
  h+='</div>';
  var baseDef=bl?bl.sum.totDef:0;
  var keys=[["qr","Core Quarry","t/d"],["pr","Placement","t/d"],["tt","Tura Transport","t/d"],["at","Aswan Transport","t/d"],["aq","Aswan Quarry","t/d"],["wf","Peak Workforce",""]];
  var changed="";keys.forEach(function(k){if(C[k[0]]!==initC[k[0]])changed+='<div><span class="k">'+k[1]+':</span> <span class="b0">'+initC[k[0]].toLocaleString()+'</span> → <span class="b1">'+C[k[0]].toLocaleString()+(k[2]?" "+k[2]:"")+'</span></div>'});
  var pct=baseDef>0?" ("+(sum.totDef<baseDef?"−":"+")+Math.abs(Math.round((sum.totDef-baseDef)/baseDef*100))+"%)":"";
  h+='<div class="pres-delta"><div style="color:rgba(212,168,85,0.7);font-weight:700;margin-bottom:4px">BASELINE → CHANGED → CONSEQUENCE</div>'+
    (changed||'<div class="k">No levers changed from orthodox baseline.</div>')+
    '<div style="margin-top:6px"><span class="k">Deficit:</span> <span class="b0">'+ft(baseDef)+'</span> → <span style="font-weight:700;color:'+(sum.totDef>baseDef?"#cc5500":"#4a9")+'">'+ft(sum.totDef)+'</span>'+pct+'</div>'+
    '</div>';
  return h;
}
function presSlider(key,label,min,max,step,unit){
  return'<div class="slider-row"><div class="top"><label>'+label+' '+tip(key)+'</label><span class="val" id="pv_'+key+'">'+C[key].toLocaleString()+(unit?" "+unit:"")+'</span></div>'+
    '<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+C[key]+'" oninput="presTweak(\''+key+'\',this.value,\''+(unit||"")+'\')"></div>';
}
function presentShell(d){
  return'<div class="pres-wrap"><div id="presReadout">'+presReadoutHTML(d)+'</div>'+
    (d.res.length?'<div class="pres-cols"><div class="pres-ctrls"><h3>Key Levers (6)</h3>'+
      presSlider("qr","Core Quarry",50,800,10,"t/d")+
      presSlider("pr","Placement",50,600,10,"t/d")+
      presSlider("tt","Tura Transport",5,100,5,"t/d")+
      presSlider("at","Aswan Transport",2,40,1,"t/d")+
      presSlider("aq","Aswan Quarry",2,50,1,"t/d")+
      presSlider("wf","Peak Workforce",5000,100000,1000,"")+
      '<button class="pres-reset" onclick="resetAll()">↺ ORTHODOX BASELINE</button>'+
      '</div><div id="presRight">'+presRightHTML(d)+'</div></div>':'')+
    '</div>';
}
function drawPresentChart(d){
  if(!d.res.length)return;
  drawChart("ch1",d.res,[{key:"accDef",type:"area",color:COL.deficit,fill:"rgba(204,85,0,0.15)",width:2.5}],{height:240});
}
function presTweak(key,val,unit){
  C[key]=Number(val);S.activePreset="";
  var lbl=document.getElementById("pv_"+key);if(lbl)lbl.textContent=Number(val).toLocaleString()+(unit?" "+unit:"");
  if(presTweak._raf)return;presTweak._raf=true; // coalesce readout rebuilds; controls column is left untouched so drag stays smooth
  requestAnimationFrame(function(){presTweak._raf=false;var d=presData();
    var ro=document.getElementById("presReadout");if(ro)ro.innerHTML=presReadoutHTML(d);
    var rt=document.getElementById("presRight");if(rt){rt.innerHTML=presRightHTML(d);drawPresentChart(d)}});
}

function updateSolver(idx,tgt){
  var el=document.getElementById("solverResult"+idx);var lbl=document.getElementById("tgt"+idx);
  if(!el)return;if(lbl)lbl.textContent=tgt+" yrs";
  var s=structs[idx],rv=reverseSolve(s,tgt,C,S.cann,S.seas);if(!rv)return;
  var winNote='<div style="font-size:9px;font-family:var(--m);color:rgba(255,255,255,0.5);margin:2px 0 8px;padding:5px 8px;background:rgba(212,168,85,0.06);border:1px solid rgba(212,168,85,0.12);border-radius:4px">Reign window <b style="color:#d4a855">'+tgt+' yrs</b> \u2212 terminal finishing <b style="color:#cc5500">'+rv.finY+' yrs</b> (Haase) = block-laying window <b style="color:#5b98d4">'+rv.buildTgt+' yrs</b>. Required annual throughput below is compared against modeled effective capacity (same workforce/labour/seasonal scaling as the forward engine).</div>';
  var items=[{l:"Core Quarry",r:rv.core.req,c:rv.core.cur,u:"/yr",ok:rv.core.ok},{l:"Core Dressing",r:rv.coreDr.req,c:rv.coreDr.cur,u:"/yr",ok:rv.coreDr.ok},{l:"Plateau Trnsp",r:rv.coreTr.req,c:rv.coreTr.cur,u:"/yr",ok:rv.coreTr.ok},
    {l:"Placement",r:rv.place.req,c:rv.place.cur,u:"/yr",ok:rv.place.ok},{l:"Tura Quarry",r:rv.tura.req,c:rv.tura.cur,u:"/yr",ok:rv.tura.ok},
    {l:"Casing Dressing",r:rv.turaDr.req,c:rv.turaDr.cur,u:"/yr",ok:rv.turaDr.ok},{l:"Tura Trnsp",r:rv.turaTr.req,c:rv.turaTr.cur,u:"/yr",ok:rv.turaTr.ok},{l:"Aswan Quarry",r:rv.aswan.req,c:rv.aswan.cur,u:"/yr",ok:rv.aswan.ok},
    {l:"Granite Dressing",r:rv.aswanDr.req,c:rv.aswanDr.cur,u:"/yr",ok:rv.aswanDr.ok},{l:"Aswan Trnsp",r:rv.aswanTr.req,c:rv.aswanTr.cur,u:"/yr",ok:rv.aswanTr.ok}];
  var html=winNote+'<div class="rev-result">';
  items.forEach(function(it){var m=it.c>0?(it.r/it.c).toFixed(1)+"x":"n/a";
    html+='<div class="rev-item"><div class="rl">'+it.l+'</div><div class="rv '+(it.ok?"ok":"up")+'">'+ft(it.r)+it.u+'</div><div class="rc">Cap: '+ft(it.c)+it.u+' \u00B7 '+(it.ok?"\u2713":"Need "+m)+'</div></div>'});
  el.innerHTML=html+'</div>'}

// ── Helpers ──
function slG(sect,key,label,val,min,max,step,unit,ttKey){
  return(sect?'<div class="section-label" style="margin-top:8px">'+sect+'</div>':'')+
    '<div class="slider-row"><div class="top"><label>'+label+' '+(ttKey?tip(ttKey):"")+'</label><span class="val" id="cv_'+key+'">'+val.toLocaleString()+(unit?" "+unit:"")+'</span></div>'+
    // oninput updates main only (sidebar slider stays put); onchange (release) does a full render to reconcile preset/labour readouts
    '<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" oninput="setC(\''+key+'\',this.value,\''+(unit||"")+'\')" onchange="render()"></div>'}
function setC(key,val,unit){
  C[key]=Number(val);S.activePreset="";
  var el=document.getElementById("cv_"+key);if(el)el.textContent=Number(val).toLocaleString()+(unit?" "+unit:"");
  scheduleMain();
}
function cardH(label,value,sub,cls,ttKey){
  return'<div class="card '+(cls||"")+'"><div class="lbl"><span>'+label+'</span>'+(ttKey?tip(ttKey):"")+'</div><div class="num">'+value+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>'}
function structEd(s,i){
  var dur=calcDuration(s,C,S.cann,S.seas);var setY=Math.abs(s.ey-s.sy);var over=dur.years>setY;
  return'<div class="struct-ed'+(s.enabled?"":" disabled")+'"><div class="sname"><span>'+s.name+'</span><span style="display:flex;gap:3px">'+
    '<button class="s-btn '+(s.enabled?"on":"")+'" onclick="event.stopPropagation();S.activeGroup=\'\';structs['+i+'].enabled=!structs['+i+'].enabled;render()">'+(s.enabled?"On":"Off")+'</button>'+
    '<button class="s-btn solo" onclick="event.stopPropagation();soloStruct('+i+')">Solo</button></span></div>'+
    '<div class="struct-grid">'+
    sEd(i,"tm","Total Mass",s.tm,100000,10000000,50000,"t")+sEd(i,"cl","Core",s.cl,50000,8000000,50000,"t")+
    sEd(i,"cs","Tura",s.cs,10000,1000000,10000,"t")+sEd(i,"gr","Granite",s.gr,5000,500000,5000,"t")+
    (S.cann?sEd(i,"ob","Overbuilt",s.ob,s.tm,15000000,100000,"t"):"")+
    sEd(i,"sy","Start BCE",Math.abs(s.sy),2400,2620,1,"",true)+sEd(i,"ey","End BCE",Math.abs(s.ey),2400,2620,1,"",true)+
    sEd(i,"fin","Finishing yrs",s.fin,0,4,0.5,"y")+
    '</div><div class="dur-box">Actual duration: <span class="dv">'+dur.years+' yrs</span> (set: '+setY+') \u2014 build '+dur.buildYears+'y + finishing '+dur.finYears+'y'+(over?'<div class="warn">\u26A0 Overrun: '+(dur.years-setY)+'y. Bound by '+dur.binding+'</div>':'<div style="color:#4a9;font-size:8.5px;margin-top:1px">\u2713 Achievable</div>')+'</div></div>'}
function sEd(i,key,label,val,min,max,step,unit,neg){
  return'<div class="slider-row"><div class="top"><label>'+label+'</label><span class="val" id="sv_'+i+'_'+key+'">'+val.toLocaleString()+(unit?" "+unit:"")+'</span></div>'+
    '<input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" oninput="setStruct('+i+',\''+key+'\',this.value,'+(neg?"true":"false")+',\''+(unit||"")+'\')" onchange="render()"></div>'}
function setStruct(i,key,val,neg,unit){
  var v=(neg?-1:1)*Number(val);
  // Chronology guard: the start and end sliders are independent, so without this a user can
  // set an end year at or before the start year. Either produces a structure that silently
  // contributes nothing rather than reporting an error. Enforce a minimum one-year span,
  // clamping only the value being moved so the other slider stays where the user put it.
  if(key==="sy"&&v>structs[i].ey-1)v=structs[i].ey-1;
  else if(key==="ey"&&v<structs[i].sy+1)v=structs[i].sy+1;
  structs[i][key]=v;
  var shown=neg?-v:v;
  var el=document.getElementById("sv_"+i+"_"+key);if(el)el.textContent=Number(shown).toLocaleString()+(unit?" "+unit:"");
  scheduleMain();
}
function soloStruct(idx){S.activeGroup="";structs.forEach(function(s,i){s.enabled=(i===idx)});render()}
function toggleLeg(key){S.legFilter[key]=!S.legFilter[key];render()}
function resetAll(){structs=JSON.parse(JSON.stringify(initStructs));C=JSON.parse(JSON.stringify(initC));
  S.legFilter={cU:true,tU:true,aU:true};S.activePreset="lehner";S.activeGroup="all";
  S.cann=false;S.nl=true;S.seas=true;S.present=false;document.body.classList.remove("present"); // full reset: toggles back to defaults
  render()}
// RFC-4180 quoting: wrap in quotes and double internal quotes for any field containing a comma, quote or newline.
function csvCell(v){v=(v==null?"":String(v));return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function doCSV(){
  var an=run(structs,C,S.cann,S.nl,S.seas),res=an.res;if(!res.length)return;
  var hd=["Year","Active","Demand","Core","Tura","Aswan"];if(S.cann)hd.push("Recycled");hd.push("Capacity","Deficit","AccDef","CoreUtil%","Binding");
  var rows=res.map(function(r){var row=[r.dy,r.an.join("; "),Math.round(r.totD),Math.round(r.cD),Math.round(r.tD),Math.round(r.aD)];if(S.cann)row.push(Math.round(r.ru));
    row.push(Math.round(r.totCap),Math.round(r.totDef),Math.round(r.accDef),r.cU.toFixed(1),r.bc);return row.map(csvCell).join(",")});
  var blob=new Blob([[hd.map(csvCell).join(",")].concat(rows).join("\r\n")],{type:"text/csv"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="giza4d_"+new Date().toISOString().slice(0,10)+".csv";a.click()}
function saveSc(){
  var nm=(document.getElementById("scName")||{}).value||"";nm=nm.trim()||"Scenario "+(S.scenarios.length+1);
  var an=run(structs,C,S.cann,S.nl,S.seas),sum=an.sum;
  var bk=Object.keys(sum.bf).sort(function(a,b){return sum.bf[b]-sum.bf[a]});
  S.scenarios.push({name:nm,totD:sum.totD,totDef:sum.totDef,dfy:sum.dfy,avgU:sum.avgU,totR:sum.totR,pb:bk[0]||"None"});persistSc();render()}
function delSc(i){S.scenarios.splice(i,1);persistSc();render()}
document.title="Fourth Dynasty Constraint Engine v"+VERSION;
(function(){var v=document.getElementById("verTag");if(v)v.textContent="v"+VERSION})();
window.addEventListener("resize",function(){render()});
render();
</script>
